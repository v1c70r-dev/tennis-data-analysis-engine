services:
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - tennis-net
    depends_on:
      - api_gateway
    extra_hosts:
      - "host.docker.internal:host-gateway"