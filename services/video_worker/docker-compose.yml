services:
  video_worker:
    build:
      context: ../../
      dockerfile: services/video_worker/Dockerfile
    container_name: video_worker
    restart: unless-stopped

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      - S3_ENDPOINT=${S3_ENDPOINT:-http://minio:9000}
      - S3_ACCESS_KEY=${MINIO_ROOT_USER:-admin}
      - S3_SECRET_KEY=${MINIO_ROOT_PASSWORD:-password}
      - S3_BUCKET=${S3_BUCKET:-tennis-data}
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}

    depends_on:
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy

    networks:
      - tennis-net

    volumes:
      - .:/app/services/video_worker
      - ../shared:/app/services/shared