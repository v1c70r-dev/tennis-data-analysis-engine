services:
  video_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: video_worker
    restart: unless-stopped

    environment:
      - PYTHONUNBUFFERED=1

      # RabbitMQ (mejor como URL única)
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}

      # MinIO / S3
      - S3_ENDPOINT=${S3_ENDPOINT:-http://minio:9000}
      - S3_ACCESS_KEY=${MINIO_ROOT_USER:-admin}
      - S3_SECRET_KEY=${MINIO_ROOT_PASSWORD:-password}
      - S3_BUCKET=${S3_BUCKET:-tennis-data}

      # Postgres
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}

    depends_on:
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy

    networks:
      - tennis-net

    volumes:
      - .:/app
      
    # Para GPU (opcional, solo si tienes soporte en Docker)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - capabilities: [gpu]



